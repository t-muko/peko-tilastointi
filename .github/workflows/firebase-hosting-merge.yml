name: Firebase Deploy

on:
  push:
    branches:
      - main
      - test
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies and build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Authenticate Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEKO_TILASTOINTI }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/firebase-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=$HOME/firebase-key.json" >> $GITHUB_ENV

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # --- PR CLOSED → DELETE PREVIEW CHANNEL ---
      - name: Delete preview channel
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          firebase hosting:channel:delete "$CHANNEL" --project peko-tilastointi --force

      # --- MAIN BRANCH → LIVE DEPLOY ---
      # - name: Deploy Firestore rules (main)
      #   if: github.ref == 'refs/heads/main'
      #   run: firebase deploy --only firestore:rules --project peko-tilastointi

      - name: Deploy Hosting to live
        if: github.ref == 'refs/heads/main'
        run: firebase deploy --only hosting --project peko-tilastointi

      # --- TEST BRANCH → PREVIEW CHANNEL DEPLOY ---
      - name: Deploy test branch preview
        if: github.event_name == 'push' && github.ref == 'refs/heads/test'
        run: |
          output=$(firebase hosting:channel:deploy "test" --project peko-tilastointi --expires 30d 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ]; then
            exit $status
          fi

          preview_url=$(echo "$output" | sed -nE 's/.*Channel URL \([^)]*\): (https:\/\/[^[:space:]]+).*/\1/p' | tail -n1)
          if [ -z "$preview_url" ]; then
            preview_url=$(echo "$output" | grep -Eo 'https://[^[:space:]]+' | grep -E 'web\.app|firebaseapp\.com' | tail -n1 || true)
          fi
          if [ -n "$preview_url" ]; then
            echo "Test preview URL: $preview_url"
            echo "### Test Preview" >> "$GITHUB_STEP_SUMMARY"
            echo "$preview_url" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Preview URL not found in Firebase CLI output."
          fi

      # --- PR → PREVIEW DEPLOY ---
      - name: Deploy PR preview
        if: false && github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          output=$(firebase hosting:channel:deploy "$CHANNEL" --project peko-tilastointi --expires 30d 2>&1)
          status=$?
          echo "$output"
          if [ $status -ne 0 ]; then
            exit $status
          fi

          preview_url=$(echo "$output" | sed -nE 's/.*Channel URL \([^)]*\): (https:\/\/[^[:space:]]+).*/\1/p' | tail -n1)
          if [ -z "$preview_url" ]; then
            preview_url=$(echo "$output" | grep -Eo 'https://[^[:space:]]+' | grep -E 'web\.app|firebaseapp\.com' | tail -n1 || true)
          fi
          if [ -n "$preview_url" ]; then
            echo "PR preview URL: $preview_url"
            echo "### PR Preview ($CHANNEL)" >> "$GITHUB_STEP_SUMMARY"
            echo "$preview_url" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Preview URL not found in Firebase CLI output."
          fi
