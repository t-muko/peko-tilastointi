name: Firebase Deploy

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies and build
        run: |
          yarn install --network-timeout=30000
          yarn build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Authenticate Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PEKO_TILASTOINTI }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > $HOME/firebase-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-key.json"

      # --- PR CLOSED → DELETE PREVIEW CHANNEL ---
      - name: Delete preview channel
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          firebase hosting:channel:delete "$CHANNEL" --project peko-tilastointi --force

      # --- MAIN BRANCH → LIVE DEPLOY ---
      - name: Deploy Firestore rules (main)
        if: github.ref == 'refs/heads/main'
        run: firebase deploy --only firestore:rules --project peko-tilastointi

      - name: Deploy Hosting to live
        if: github.ref == 'refs/heads/main'
        run: firebase deploy --only hosting --project peko-tilastointi

      # --- PR → PREVIEW DEPLOY ---
      - name: Deploy PR preview
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          firebase hosting:channel:deploy "$CHANNEL" --project peko-tilastointi
